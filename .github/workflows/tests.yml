name: Tests

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main, 'feature/**']

jobs:
  sdk:
    name: orkes-php-sdk (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: packages/orkes-php-sdk
      - name: Run tests
        run: composer test
        working-directory: packages/orkes-php-sdk

  laravel:
    name: laravel-conductor (PHP ${{ matrix.php }}, Laravel ${{ matrix.laravel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11']
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - name: Install SDK deps
        run: composer install --no-interaction --prefer-dist
        working-directory: packages/orkes-php-sdk
      - name: Install Laravel package deps
        run: |
          composer require "illuminate/support:^${{ matrix.laravel }}" "illuminate/console:^${{ matrix.laravel }}" "illuminate/config:^${{ matrix.laravel }}" --no-interaction --no-update
          composer update --no-interaction
        working-directory: packages/laravel-conductor
      - name: Run tests
        run: composer test
        working-directory: packages/laravel-conductor
